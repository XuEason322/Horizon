name: Daily Horizon Summary

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  daily-summary:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync

      - name: Run Horizon
        env:
          OPENAI_API_KEY: "sk-api-6l3HQw-g7XpQ7AnHFtsAhO38KZbnRQSAoPNOsLYn33Z_L8qu7RCnFTfqqAb_Qu4rDV352OOfk04fmnk0pVFcUIIiDSvVGTbLHod4ZA3xxtIv8hvSssWTODY"
          OPENAI_BASE_URL: "https://api.minimaxi.com/v1"
          HORIZON_WEBHOOK_URL: "https://example.com"
        run: uv run horizon --hours 24

      - name: Set current date as environment variable
        run: echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          keep_files: true
          commit_message: "Daily Summary: ${{ env.DATE }}"
          publish_branch: gh-pages
          enable_jekyll: true
